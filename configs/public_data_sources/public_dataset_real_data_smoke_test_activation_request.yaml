request_id: multi_cancer_public_dataset_real_data_smoke_test_activation_demo
atlas_name: multi_cancer_realdata_pilot
purpose: Run a first-real-dataset smoke-test activation bundle for the selected pilot, including file detection, validation-gate rollup, activation readiness, feature-store handoff readiness, and a one-command rerun plan.

inputs:
  pilot_execution_orchestrator_state: outputs/public_data_acquisition/multi_cancer_realdata_pilot/pilot_execution_orchestrator/public_dataset_pilot_execution_orchestrator_state.tsv
  pilot_execution_gate_table: outputs/public_data_acquisition/multi_cancer_realdata_pilot/pilot_execution_orchestrator/public_dataset_pilot_execution_validation_gate_table.tsv
  pilot_manifest_activation_queue: outputs/public_data_acquisition/multi_cancer_realdata_pilot/pilot_execution_orchestrator/public_dataset_pilot_manifest_activation_queue.tsv
  pilot_feature_store_handoff_queue: outputs/public_data_acquisition/multi_cancer_realdata_pilot/pilot_execution_orchestrator/public_dataset_pilot_feature_store_handoff_queue.tsv
  pilot_execution_summary: outputs/public_data_acquisition/multi_cancer_realdata_pilot/pilot_execution_orchestrator/public_dataset_pilot_execution_orchestrator_summary.yaml
  first_real_pilot_selection: outputs/public_data_acquisition/multi_cancer_realdata_pilot/first_real_pilot_activation/public_dataset_first_real_pilot_selection.tsv
  file_validation_table: outputs/public_data_acquisition/multi_cancer_realdata_pilot/dataset_replacement_file_validation/public_dataset_replacement_file_validation_table.tsv
  modality_schema_validation_table: outputs/public_data_acquisition/multi_cancer_realdata_pilot/modality_schema_validation/public_dataset_modality_schema_validation_table.tsv

expected_outputs:
  real_data_smoke_test_activation_dir: outputs/public_data_acquisition/multi_cancer_realdata_pilot/real_data_smoke_test_activation

smoke_test_policy:
  do_not_download_data: true
  do_not_create_or_modify_real_replacement_files: true
  do_not_overwrite_original_manifests: true
  generate_activation_artifacts_only_when_validated: true
  generate_blocker_report: true
  generate_single_command_rerun_script: true
  require_file_validation_pass: true
  require_modality_schema_validation_pass: true

agent_role:
  stage: public_dataset_real_data_smoke_test_activation_bundle
  purpose: provide a real-data smoke-test controller that reports whether the selected first pilot is ready for manifest activation and feature-store handoff.
