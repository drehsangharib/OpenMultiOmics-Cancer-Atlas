request_id: multi_cancer_public_dataset_replacement_readiness_validation_demo
atlas_name: multi_cancer_realdata_pilot
purpose: Validate whether public dataset replacement candidates generated by the a22 workflow are ready for real-file replacement validation.

inputs:
  replacement_plan: outputs/public_data_acquisition/multi_cancer_realdata_pilot/dataset_replacement_workflow/public_dataset_replacement_plan.tsv
  replacement_manifest_inventory: outputs/public_data_acquisition/multi_cancer_realdata_pilot/dataset_replacement_workflow/replacement_manifest_inventory.tsv
  replacement_summary: outputs/public_data_acquisition/multi_cancer_realdata_pilot/dataset_replacement_workflow/public_dataset_replacement_summary.yaml

expected_outputs:
  readiness_dir: outputs/public_data_acquisition/multi_cancer_realdata_pilot/dataset_replacement_readiness

readiness_policy:
  require_replacement_manifest_stub: true
  require_real_replacement_file: true
  require_required_metadata: true
  do_not_modify_replacement_manifests: true

agent_role:
  stage: public_dataset_replacement_readiness_validation
  purpose: validate candidate readiness before replacing placeholder matrices with real public dataset files.
