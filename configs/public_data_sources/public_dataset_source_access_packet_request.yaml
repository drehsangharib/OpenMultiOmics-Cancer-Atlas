request_id: multi_cancer_public_dataset_source_access_packet_demo
atlas_name: multi_cancer_realdata_pilot
purpose: Build source-specific public dataset access packets using the accession registry and acquisition operations outputs.

inputs:
  dataset_accession_registry: configs/public_data_sources/public_dataset_accession_registry.yaml
  acquisition_task_board: outputs/public_data_acquisition/multi_cancer_realdata_pilot/dataset_acquisition_operations/public_dataset_acquisition_task_board.tsv
  real_file_intake_inventory: outputs/public_data_acquisition/multi_cancer_realdata_pilot/real_file_intake/public_dataset_real_file_intake_inventory.tsv
  modality_schema_validation_table: outputs/public_data_acquisition/multi_cancer_realdata_pilot/modality_schema_validation/public_dataset_modality_schema_validation_table.tsv

expected_outputs:
  source_access_packet_dir: outputs/public_data_acquisition/multi_cancer_realdata_pilot/source_access_packets

source_access_policy:
  generate_per_dataset_packet_yaml: true
  generate_download_command_templates: true
  generate_portal_link_table: true
  generate_operator_next_steps: true
  do_not_download_data: true
  do_not_create_or_modify_real_replacement_files: true

agent_role:
  stage: public_dataset_source_access_packet_bundle
  purpose: create source-specific access packets and command templates that help operators acquire real public files for each candidate dataset.
